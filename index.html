<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificador APLV</title>
<meta name="theme-color" content="#fffbeb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="APLV">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f9f9f7; color: #1a1a1a; }
  .tabs { display: flex; border-bottom: 1px solid #e5e5e5; background: #fff; position: sticky; top: 0; z-index: 10; }
  .tab { flex: 1; padding: 14px; text-align: center; font-size: 14px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
  .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
  .panel { display: none; padding: 1.25rem 1rem; max-width: 680px; margin: 0 auto; }
  .panel.active { display: block; }
  input[type=text] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 14px; color: #1a1a1a; background: #fff; margin-bottom: 10px; }
  input[type=text]:focus { outline: none; border-color: #999; }
  textarea { width: 100%; min-height: 110px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; font-size: 14px; color: #1a1a1a; background: #fff; resize: vertical; line-height: 1.6; }
  textarea:focus { outline: none; border-color: #999; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #1a1a1a; font-size: 14px; cursor: pointer; font-family: inherit; }
  .btn:hover { background: #f5f5f3; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { border-color: #999; font-weight: 500; }
  .upload-label { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; font-size: 14px; cursor: pointer; font-family: inherit; }
  .upload-label:hover { background: #f5f5f3; }
  .camera-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .preview-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .preview-wrap { position: relative; width: calc(50% - 4px); }
  .preview-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid #eee; display: block; }
  .preview-remove { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.55); color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 12px; cursor: pointer; }
  .ocr-status { font-size: 13px; color: #666; display: flex; align-items: center; gap: 8px; padding: 4px 0 8px; }
  .result-card { border-radius: 12px; border: 1px solid #e5e5e5; overflow: hidden; margin-top: 1.25rem; }
  .result-header { padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
  .result-header.safe { background: #eaf3de; border-bottom: 1px solid #c0dd97; }
  .result-header.danger { background: #fcebeb; border-bottom: 1px solid #f7c1c1; }
  .result-header.warning { background: #faeeda; border-bottom: 1px solid #fac775; }
  .result-icon { font-size: 16px; font-weight: 700; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .result-icon.safe { background: #c0dd97; color: #27500a; }
  .result-icon.danger { background: #f7c1c1; color: #791f1f; }
  .result-icon.warning { background: #fac775; color: #633806; }
  .result-title { font-size: 15px; font-weight: 500; }
  .result-title.safe { color: #27500a; }
  .result-title.danger { color: #791f1f; }
  .result-title.warning { color: #633806; }
  .result-body { padding: 16px 18px; background: #fff; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #888; margin-bottom: 8px; margin-top: 14px; }
  .section-label:first-child { margin-top: 0; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 13px; margin: 3px 3px 3px 0; }
  .tag-danger { background: #fcebeb; color: #791f1f; border: 1px solid #f7c1c1; }
  .tag-warning { background: #faeeda; color: #633806; border: 1px solid #fac775; }
  .analysis-text { font-size: 14px; line-height: 1.7; color: #1a1a1a; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #888; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .ex-btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid #e5e5e5; background: #f5f5f3; color: #555; cursor: pointer; font-family: inherit; }
  .ex-btn:hover { background: #ebebea; }
  .divider { border: none; border-top: 1px solid #eee; margin: 14px 0; }
  .history-empty { text-align: center; padding: 3rem 1rem; color: #999; font-size: 14px; }
  .history-filters { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; background: #fff; color: #555; cursor: pointer; font-family: inherit; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .history-item { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
  .history-item-header { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .verdict-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .verdict-dot.safe { background: #639922; }
  .verdict-dot.danger { background: #e24b4a; }
  .verdict-dot.warning { background: #ba7517; }
  .history-name { font-size: 14px; font-weight: 500; flex: 1; }
  .history-date { font-size: 12px; color: #999; white-space: nowrap; }
  .history-summary { font-size: 13px; color: #666; margin-top: 4px; padding-left: 20px; }
  .history-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
  .history-detail.open { display: block; }
  .delete-btn { font-size: 13px; color: #bbb; background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; font-family: inherit; flex-shrink: 0; }
  .delete-btn:hover { color: #e24b4a; background: #fcebeb; }
  .reanalyze-btn { font-size: 12px; color: #555; background: #f5f5f3; border: 1px solid #e5e5e5; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; }
  .reanalyze-btn:hover { background: #ebebea; border-color: #ccc; }
  .reanalyze-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .edit-btn { font-size: 13px; color: #bbb; background: none; border: none; cursor: pointer; padding: 2px 5px; border-radius: 4px; font-family: inherit; flex-shrink: 0; }
  .edit-btn:hover { color: #555; background: #f0f0ee; }
  .history-stats { display: flex; gap: 10px; margin-bottom: 1rem; }
  .stat-pill { flex: 1; text-align: center; padding: 8px; border-radius: 8px; border: 1px solid #eee; background: #fff; }
  .stat-num { font-size: 20px; font-weight: 500; }
  .stat-label { font-size: 11px; color: #888; margin-top: 2px; }
  .stat-pill.s { border-color: #c0dd97; background: #eaf3de; }
  .stat-pill.s .stat-num { color: #27500a; }
  .stat-pill.d { border-color: #f7c1c1; background: #fcebeb; }
  .stat-pill.d .stat-num { color: #791f1f; }
  .stat-pill.w { border-color: #fac775; background: #faeeda; }
  .stat-pill.w .stat-num { color: #633806; }
  .loading-history { text-align: center; padding: 2rem; color: #999; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="switchTab('analyzer')">Analizar</button>
  <button class="tab" onclick="switchTab('history')">Historial</button>
</div>

<div class="panel active" id="panel-analyzer">
  <input type="text" id="productName" placeholder="Nombre del producto (opcional)" />
  <div class="camera-row">
    <label class="upload-label" for="cameraInput">📷 Tomar foto</label>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleImage(this)">
    <label class="upload-label" for="galleryInput">🖼 Subir imagen</label>
    <input type="file" id="galleryInput" accept="image/*" multiple style="display:none" onchange="handleImage(this)">
  </div>
  <div id="previewArea"><div id="previewGrid" class="preview-grid"></div></div>
  <textarea id="ingredients" placeholder="O pega aquí la lista de ingredientes manualmente..."></textarea>
  <div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
    <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()">Analizar ↗</button>
    <button class="btn" onclick="clearAll()">Limpiar</button>
  </div>
  <div style="margin-top:14px;">
    <span style="font-size:12px;color:#888;">Ejemplos rápidos:</span>
    <div class="examples">
      <button class="ex-btn" onclick="loadExample(0)">Galletas con trazas</button>
      <button class="ex-btn" onclick="loadExample(1)">Pan de molde</button>
      <button class="ex-btn" onclick="loadExample(2)">Leche vegetal</button>
      <button class="ex-btn" onclick="loadExample(3)">Embutido</button>
    </div>
  </div>
  <div id="result"></div>
</div>

<div class="panel" id="panel-history">
  <div id="historyStats" class="history-stats" style="display:none">
    <div class="stat-pill s"><div class="stat-num" id="countSafe">0</div><div class="stat-label">Seguros</div></div>
    <div class="stat-pill w"><div class="stat-num" id="countWarn">0</div><div class="stat-label">Precaución</div></div>
    <div class="stat-pill d"><div class="stat-num" id="countDanger">0</div><div class="stat-label">Peligrosos</div></div>
  </div>
  <div id="historySearch" style="display:none;position:relative;margin-bottom:12px;">
    <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#aaa;font-size:15px;">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="renderHistory()" style="padding-left:36px;margin-bottom:0;">
  </div>
  <div class="history-filters" id="historyFilters" style="display:none">
    <button class="filter-btn active" onclick="filterHistory('all',this)">Todos</button>
    <button class="filter-btn" onclick="filterHistory('SEGURO',this)">Seguros</button>
    <button class="filter-btn" onclick="filterHistory('PRECAUCIÓN',this)">Precaución</button>
    <button class="filter-btn" onclick="filterHistory('PELIGROSO',this)">Peligrosos</button>
  </div>
  <div id="historyList"><div class="loading-history"><span class="spinner"></span> Cargando historial...</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyABzowTiaeOYcod6kk6jFotHwSaTl7DpT4",
  authDomain: "aplv-2cc1e.firebaseapp.com",
  projectId: "aplv-2cc1e",
  storageBucket: "aplv-2cc1e.firebasestorage.app",
  messagingSenderId: "1034305039453",
  appId: "1:1034305039453:web:ccb90b41b00fde812171b4"
});
const db = firebase.firestore();

const examples = [
  { name: "Galletas de chocolate", ingredients: "Harina de trigo, azúcar, grasa vegetal, cacao en polvo 5%, almidón de maíz, leudante (bicarbonato de sodio), sal, vainillina. Puede contener trazas de leche, huevo y frutos secos." },
  { name: "Pan de molde integral", ingredients: "Harina de trigo integral, agua, suero de leche en polvo, levadura, sal, aceite de girasol, emulsionante E-471, extracto de malta, conservante (propionato de calcio)." },
  { name: "Bebida de avena", ingredients: "Agua, avena 10%, aceite de girasol, sal, vitaminas (D2, B12, riboflavina). Sin lactosa. Elaborado en instalaciones que también procesan leche." },
  { name: "Mortadela", ingredients: "Carne de cerdo, agua, fécula de papa, proteína de leche, sal, especias, dextrosa, antioxidante (ascorbato de sodio), conservante (nitrito de sodio)." }
];
let images = []; // [{base64, type}]
let allHistory = [];
let currentFilter = 'all';

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['analyzer','history'][i] === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'history') loadHistory();
}

function loadExample(i) {
  document.getElementById('productName').value = examples[i].name;
  document.getElementById('ingredients').value = examples[i].ingredients;
  images = [];
  renderPreviews();
}

function clearAll() {
  document.getElementById('productName').value = '';
  document.getElementById('ingredients').value = '';
  document.getElementById('result').innerHTML = '';
  images = [];
  renderPreviews();
  document.getElementById('cameraInput').value = '';
  document.getElementById('galleryInput').value = '';
}

function removeImage(idx) {
  images.splice(idx, 1);
  renderPreviews();
}

function renderPreviews() {
  const grid = document.getElementById('previewGrid');
  if (images.length === 0) { grid.innerHTML = ''; return; }
  grid.innerHTML = images.map((img, i) => `
    <div class="preview-wrap">
      <img src="data:${img.type};base64,${img.base64}" class="preview-img" alt="Foto ${i+1}">
      <button class="preview-remove" onclick="removeImage(${i})">✕</button>
    </div>`).join('');
}

function handleImage(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      images.push({ base64: dataUrl.split(',')[1], type: file.type || 'image/jpeg' });
      loaded++;
      if (loaded === files.length) renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

async function analyze() {
  const ingredientsText = document.getElementById('ingredients').value.trim();
  const productName = document.getElementById('productName').value.trim();
  if (!ingredientsText && images.length === 0) { document.getElementById('ingredients').focus(); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Analizando...';
  document.getElementById('result').innerHTML = `<div class="result-card"><div class="result-body" style="padding:20px 18px;display:flex;align-items:center;gap:10px;color:#666;font-size:14px;"><span class="spinner"></span> ${images.length > 0 ? 'Leyendo ' + (images.length > 1 ? images.length + ' fotos...' : 'imagen...') : 'Revisando ingredientes...'}</div></div>`;

  const productContext = productName ? `Producto: "${productName}"\n` : '';
  const jsonSchema = `{"extracted_text":"texto extraído o vacío","verdict":"PELIGROSO|PRECAUCIÓN|SEGURO","summary":"frase corta","direct_ingredients":[],"hidden_ingredients":[],"traces":"descripción o Ninguna traza mencionada","explanation":"3-5 oraciones para la mamá en español tono cálido","recommendation":"una oración práctica"}`;
  const criteria = `Clasifica así:
PELIGROSO (contiene lácteos): leche, mantequilla, crema, queso, yogur, nata, requesón, ghee, lactosa, lactoferrina, lactulosa, caseína, caseinato (de sodio, calcio, potasio), alfa lactoalbúmina, beta lactoalbúmina, lactoalbúmina, lactoglobulina, albumina de suero bovino, proteína de leche, sólidos de leche, suero, suero en polvo, suero deslactosado, suero desmineralizado, concentrado de proteínas de suero, proteínas hidrolizadas de suero, lactosuero, mayonesa comercial, esencia de crema, esencia de crema bávara. Códigos E/H de origen lácteo: E472 (ésteres lácticos), E481/E482 (lactilatos de sodio y calcio), E966 (lactitol), E325/E326/E327 (lactatos), H4511/H4512 (caseinatos).
PRECAUCIÓN: trazas de leche, fabricado en instalaciones con lácteos, "proteína animal" sin especificar fuente, caldo concentrado de carne o costilla (puede contener lácteos ocultos), E270 (ácido láctico — origen ambiguo), cualquier ingrediente ambiguo que podría ser derivado lácteo.
SEGURO: sin ninguno de los anteriores ni trazas de leche.`;

  let messages;
  if (images.length > 0) {
    const imageBlocks = images.map(img => ({ type: "image", source: { type: "base64", media_type: img.type, data: img.base64 } }));
    const textNote = images.length > 1 ? `Se envían ${images.length} fotos del mismo producto — combina el texto de todas para obtener la lista completa de ingredientes.` : '';
    messages = [{ role: "user", content: [
      ...imageBlocks,
      { type: "text", text: `Eres experto en APLV. Madre lactante en dieta de eliminación estricta.\n${productContext}${textNote}\nExtrae los ingredientes de las imágenes y analiza lácteos directos, ocultos y trazas.\nResponde SOLO JSON sin backticks: ${jsonSchema}\n${criteria}` }
    ]}];
  } else {
    messages = [{ role: "user", content: `Eres experto en APLV. Madre lactante en dieta de eliminación estricta.\n${productContext}Ingredientes: ${ingredientsText}\nResponde SOLO JSON sin backticks: ${jsonSchema}\n${criteria}` }];
  }

  try {
    const res = await fetch("/.netlify/functions/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages })
    });
    const data = await res.json();
    const text = data.content.map(i => i.text || "").join("");
    const result = JSON.parse(text.replace(/```json|```/g, "").trim());

    if (result.extracted_text && !ingredientsText) {
      document.getElementById('ingredients').value = result.extracted_text;
    }

    renderResult(result, productName);

    await db.collection("scans").add({
      productName: productName || "Sin nombre",
      ingredients: result.extracted_text || ingredientsText,
      verdict: result.verdict,
      summary: result.summary || "",
      direct_ingredients: result.direct_ingredients || [],
      hidden_ingredients: result.hidden_ingredients || [],
      traces: result.traces || "",
      explanation: result.explanation || "",
      recommendation: result.recommendation || "",
      timestamp: new Date().toISOString()
    });

  } catch (e) {
    document.getElementById('result').innerHTML = `<div class="result-card"><div class="result-body"><p style="color:#c00;font-size:14px;">Error al analizar. Intenta de nuevo.</p></div></div>`;
  }
  btn.disabled = false;
  btn.innerHTML = 'Analizar ↗';
}

function renderResult(r, productName) {
  const cfg = {
    'PELIGROSO': { cls: 'danger', icon: '✕', label: 'No apto — contiene lácteos' },
    'PRECAUCIÓN': { cls: 'warning', icon: '!', label: 'Precaución — revisar con cuidado' },
    'SEGURO': { cls: 'safe', icon: '✓', label: 'Apto para dieta de eliminación' }
  };
  const v = cfg[r.verdict] || cfg['PRECAUCIÓN'];
  const name = productName ? `<span style="font-size:13px;color:#666;margin-top:2px;display:block;">${productName}</span>` : '';
  let tagsHtml = '';
  if (r.direct_ingredients && r.direct_ingredients.length) { tagsHtml += `<p class="section-label">Ingredientes lácteos directos</p><div>${r.direct_ingredients.map(i => `<span class="tag tag-danger">${i}</span>`).join('')}</div>`; }
  if (r.hidden_ingredients && r.hidden_ingredients.length) { tagsHtml += `<p class="section-label">Derivados ocultos o técnicos</p><div>${r.hidden_ingredients.map(i => `<span class="tag tag-danger">${i}</span>`).join('')}</div>`; }
  if (r.traces && r.traces !== 'Ninguna traza mencionada') { tagsHtml += `<p class="section-label">Trazas</p><div><span class="tag tag-warning">${r.traces}</span></div>`; }
  document.getElementById('result').innerHTML = `
    <div class="result-card">
      <div class="result-header ${v.cls}">
        <div class="result-icon ${v.cls}">${v.icon}</div>
        <div><p class="result-title ${v.cls}">${v.label}</p>${name}</div>
      </div>
      <div class="result-body">
        ${tagsHtml ? tagsHtml + '<hr class="divider">' : ''}
        <p class="section-label">Análisis</p>
        <p class="analysis-text">${r.explanation}</p>
        <p class="section-label" style="margin-top:14px;">Recomendación</p>
        <p class="analysis-text" style="font-weight:500;">${r.recommendation}</p>
      </div>
    </div>`;
}

async function loadHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = `<div class="loading-history"><span class="spinner"></span> Cargando...</div>`;
  try {
    const snap = await db.collection("scans").orderBy("timestamp", "desc").get();
    allHistory = [];
    snap.forEach(d => allHistory.push({ id: d.id, ...d.data() }));
    renderHistory();
  } catch (e) {
    list.innerHTML = `<div class="history-empty">Error al cargar. Verifica las reglas de Firestore.</div>`;
  }
}

function renderHistory() {
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  const filtered = allHistory
    .filter(h => currentFilter === 'all' || h.verdict === currentFilter)
    .filter(h => !search || h.productName.toLowerCase().includes(search) || (h.ingredients || '').toLowerCase().includes(search));

  const stats = document.getElementById('historyStats');
  const filters = document.getElementById('historyFilters');
  const searchBox = document.getElementById('historySearch');
  const list = document.getElementById('historyList');

  if (allHistory.length === 0) {
    stats.style.display = 'none'; filters.style.display = 'none'; searchBox.style.display = 'none';
    list.innerHTML = `<div class="history-empty">Aún no hay productos analizados.<br>Analiza tu primer producto para verlo aquí.</div>`;
    return;
  }

  stats.style.display = 'flex'; filters.style.display = 'flex'; searchBox.style.display = 'block';
  document.getElementById('countSafe').textContent = allHistory.filter(h => h.verdict === 'SEGURO').length;
  document.getElementById('countWarn').textContent = allHistory.filter(h => h.verdict === 'PRECAUCIÓN').length;
  document.getElementById('countDanger').textContent = allHistory.filter(h => h.verdict === 'PELIGROSO').length;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="history-empty">${search ? 'Sin resultados para "' + search + '"' : 'No hay productos en esta categoría.'}</div>`;
    return;
  }

  const clsMap = { 'SEGURO': 'safe', 'PRECAUCIÓN': 'warning', 'PELIGROSO': 'danger' };
  list.innerHTML = filtered.map(item => {
    const cls = clsMap[item.verdict] || 'warning';
    const date = item.timestamp ? new Date(item.timestamp).toLocaleDateString('es-CO', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
    const directTags = (item.direct_ingredients || []).map(i => `<span class="tag tag-danger">${i}</span>`).join('');
    const hiddenTags = (item.hidden_ingredients || []).map(i => `<span class="tag tag-danger">${i}</span>`).join('');
    const traceSection = item.traces && item.traces !== 'Ninguna traza mencionada' ? `<div style="margin-top:8px;"><span class="tag tag-warning">${item.traces}</span></div>` : '';
    const ing = item.ingredients ? `<p style="font-size:12px;color:#aaa;margin-top:8px;line-height:1.5;">${item.ingredients.substring(0, 220)}${item.ingredients.length > 220 ? '...' : ''}</p>` : '';
    const reanalyzeBtn = item.ingredients ? `<button class="reanalyze-btn" onclick="reanalyzeItem(event,'${item.id}')">↻ Re-analizar</button>` : '';
    return `
    <div class="history-item" id="hitem-${item.id}">
      <div class="history-item-header" onclick="toggleDetail('${item.id}')">
        <div class="verdict-dot ${cls}"></div>
        <span class="history-name" id="hname-${item.id}">${item.productName}</span>
        <button class="edit-btn" onclick="startRename(event,'${item.id}')">✎</button>
        <span class="history-date">${date}</span>
        <button class="delete-btn" onclick="deleteItem(event,'${item.id}')">✕</button>
      </div>
      <div class="history-summary" id="hsummary-${item.id}">${item.summary || ''}</div>
      <div class="history-detail" id="hdetail-${item.id}">
        <div id="htags-${item.id}">${directTags || hiddenTags ? `<div style="margin-bottom:6px;">${directTags}${hiddenTags}</div>` : ''}${traceSection}</div>
        <p class="analysis-text" style="margin-top:8px;font-size:13px;" id="hexpl-${item.id}">${item.explanation || ''}</p>
        ${ing}
        <div style="margin-top:12px;">${reanalyzeBtn}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleDetail(id) {
  const d = document.getElementById('hdetail-' + id);
  if (d) d.classList.toggle('open');
}

function startRename(e, id) {
  e.stopPropagation();
  const nameEl = document.getElementById('hname-' + id);
  if (!nameEl) return;
  const current = nameEl.textContent;
  nameEl.innerHTML = `<input type="text" class="rename-input" value="${current}" onclick="event.stopPropagation()" onkeydown="handleRenameKey(event,'${id}')" style="font-size:14px;font-weight:500;border:1px solid #999;border-radius:5px;padding:2px 6px;width:140px;font-family:inherit;">
    <button class="reanalyze-btn" style="margin-left:4px;padding:3px 8px;" onclick="saveRename(event,'${id}')">✓</button>`;
  const input = nameEl.querySelector('input');
  if (input) { input.focus(); input.select(); }
}

function handleRenameKey(e, id) {
  if (e.key === 'Enter') saveRename(e, id);
  if (e.key === 'Escape') {
    const item = allHistory.find(h => h.id === id);
    if (item) document.getElementById('hname-' + id).innerHTML = item.productName;
  }
}

async function saveRename(e, id) {
  e.stopPropagation();
  const nameEl = document.getElementById('hname-' + id);
  const input = nameEl ? nameEl.querySelector('input') : null;
  if (!input) return;
  const newName = input.value.trim() || 'Sin nombre';
  try {
    await db.collection("scans").doc(id).update({ productName: newName });
    const idx = allHistory.findIndex(h => h.id === id);
    if (idx !== -1) allHistory[idx].productName = newName;
    nameEl.textContent = newName;
  } catch(err) {
    alert('Error al guardar el nombre.');
    const item = allHistory.find(h => h.id === id);
    if (item) nameEl.textContent = item.productName;
  }
}

function filterHistory(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}

async function reanalyzeItem(e, id) {
  e.stopPropagation();
  const item = allHistory.find(h => h.id === id);
  if (!item || !item.ingredients) return;

  const btn = e.target;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Analizando...';
  btn.style.opacity = '0.6';

  // Open detail if not open
  const detail = document.getElementById('hdetail-' + id);
  if (detail && !detail.classList.contains('open')) detail.classList.add('open');

  const jsonSchema = `{"extracted_text":"","verdict":"PELIGROSO|PRECAUCIÓN|SEGURO","summary":"frase corta","direct_ingredients":[],"hidden_ingredients":[],"traces":"descripción o Ninguna traza mencionada","explanation":"3-5 oraciones para la mamá en español tono cálido","recommendation":"una oración práctica"}`;
  const criteria = `Clasifica así:
PELIGROSO (contiene lácteos): leche, mantequilla, crema, queso, yogur, nata, requesón, ghee, lactosa, lactoferrina, lactulosa, caseína, caseinato (de sodio, calcio, potasio), alfa lactoalbúmina, beta lactoalbúmina, lactoalbúmina, lactoglobulina, albumina de suero bovino, proteína de leche, sólidos de leche, suero, suero en polvo, suero deslactosado, suero desmineralizado, concentrado de proteínas de suero, proteínas hidrolizadas de suero, lactosuero, mayonesa comercial, esencia de crema, esencia de crema bávara. Códigos E/H de origen lácteo: E472 (ésteres lácticos), E481/E482 (lactilatos de sodio y calcio), E966 (lactitol), E325/E326/E327 (lactatos), H4511/H4512 (caseinatos).
PRECAUCIÓN: trazas de leche, fabricado en instalaciones con lácteos, "proteína animal" sin especificar fuente, caldo concentrado de carne o costilla (puede contener lácteos ocultos), E270 (ácido láctico — origen ambiguo), cualquier ingrediente ambiguo que podría ser derivado lácteo.
SEGURO: sin ninguno de los anteriores ni trazas de leche.`;

  try {
    const res = await fetch("/.netlify/functions/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: `Eres experto en APLV. Madre lactante en dieta de eliminación estricta.\nProducto: "${item.productName}"\nIngredientes: ${item.ingredients}\nResponde SOLO JSON sin backticks: ${jsonSchema}\n${criteria}` }]
      })
    });
    const data = await res.json();
    const text = data.content.map(i => i.text || "").join("");
    const result = JSON.parse(text.replace(/```json|```/g, "").trim());

    // Update Firebase
    await db.collection("scans").doc(id).update({
      verdict: result.verdict,
      summary: result.summary || "",
      direct_ingredients: result.direct_ingredients || [],
      hidden_ingredients: result.hidden_ingredients || [],
      traces: result.traces || "",
      explanation: result.explanation || "",
      recommendation: result.recommendation || "",
      timestamp: new Date().toISOString()
    });

    // Update local allHistory
    const idx = allHistory.findIndex(h => h.id === id);
    if (idx !== -1) allHistory[idx] = { ...allHistory[idx], ...result, timestamp: new Date().toISOString() };

    // Update UI inline
    const clsMap = { 'SEGURO': 'safe', 'PRECAUCIÓN': 'warning', 'PELIGROSO': 'danger' };
    const newCls = clsMap[result.verdict] || 'warning';
    const dot = document.querySelector(`#hitem-${id} .verdict-dot`);
    if (dot) { dot.className = 'verdict-dot ' + newCls; }
    const summary = document.getElementById('hsummary-' + id);
    if (summary) summary.textContent = result.summary || '';
    const expl = document.getElementById('hexpl-' + id);
    if (expl) expl.textContent = result.explanation || '';
    const tags = document.getElementById('htags-' + id);
    if (tags) {
      const dTags = (result.direct_ingredients || []).map(i => `<span class="tag tag-danger">${i}</span>`).join('');
      const hTags = (result.hidden_ingredients || []).map(i => `<span class="tag tag-danger">${i}</span>`).join('');
      const tSection = result.traces && result.traces !== 'Ninguna traza mencionada' ? `<div style="margin-top:8px;"><span class="tag tag-warning">${result.traces}</span></div>` : '';
      tags.innerHTML = (dTags || hTags ? `<div style="margin-bottom:6px;">${dTags}${hTags}</div>` : '') + tSection;
    }

    btn.innerHTML = '✓ Actualizado';
    btn.style.color = '#27500a';
    setTimeout(() => { btn.innerHTML = '↻ Re-analizar'; btn.disabled = false; btn.style.opacity = '1'; btn.style.color = ''; }, 2500);

    // Refresh stats
    document.getElementById('countSafe').textContent = allHistory.filter(h => h.verdict === 'SEGURO').length;
    document.getElementById('countWarn').textContent = allHistory.filter(h => h.verdict === 'PRECAUCIÓN').length;
    document.getElementById('countDanger').textContent = allHistory.filter(h => h.verdict === 'PELIGROSO').length;

  } catch(err) {
    btn.innerHTML = '↻ Re-analizar';
    btn.disabled = false;
    btn.style.opacity = '1';
    alert('Error al re-analizar. Intenta de nuevo.');
  }
}

async function deleteItem(e, id) {
  e.stopPropagation();
  try {
    await db.collection("scans").doc(id).delete();
    allHistory = allHistory.filter(h => h.id !== id);
    renderHistory();
  } catch (err) { alert('Error al eliminar.'); }
}
</script>
</body>
</html>
